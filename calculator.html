<!DOCTYPE html>
<html>
    <head><title>Calculator</title>
    <script src="https://kit.fontawesome.com/0166d0c935.js" crossorigin="anonymous"></script>
        <style>
    table {
        margin:auto;
        background-color:gray;
        /* display:none; */
    }
    tr {
        margin:auto;
        background-color:white;
    }
    th {
        background-color:white;
    }
        </style>
    </head>
    <body>
        <!-- <h1>Calculator</h1> -->
        <table border="1" cellpadding="10" cellspacing="10">
            <tr>
            <th><b>(</b></th>
            <th><b>)</b></th>
            <th><i class="fa-solid fa-c"></i></th>
            <th><i class="fa-solid fa-delete-left"></i></th>
        </tr>
        <tr>
            <td><i class="fa-solid fa-7"></i></td>
            <td><i class="fa-solid fa-8"></i></td>
            <td><i class="fa-solid fa-9"></i></td>
            <td><i class="fa-solid fa-divide"></i></td>
        </tr>
        <tr>
            <td><i class="fa-solid fa-4"></i></td>
            <td><i class="fa-solid fa-5"></i></td>
            <td><i class="fa-solid fa-6"></i></td>
            <td><i class="fa-solid fa-xmark"></i></td>
        </tr>
        <tr>
            <td><i class="fa-solid fa-1"></i></td>
            <td><i class="fa-solid fa-2"></i></td>
            <td><i class="fa-solid fa-3"></i></td>
            <td><i class="fa-solid fa-minus"></i></td>
        </tr>
        <tr>
            <td><i class="fa-solid fa-0"></i></td>
            <td><b>.</b></td>
            <td><i class="fa-solid fa-equals"></i></td>
            <td><i class="fa-solid fa-plus"></i></td>
        </tr>
        </table>
    </body>
</html>
