<!DOCTYPE html>
    <html>
        <head><title>CSS Practice</title>
 <!-- Internal CSS -->
    <style>
        /* Page styling */
        body {
            background: #f2f2f2;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            color:purple;
        }
        /* Heading styling */
        h1 {
            color: peru;
            font-family: cursive;
            margin-bottom: 30px;
        }
        /* Button container */
        .btn-box {
            margin-top: 20px;
        }
        /* Button styling */
        button {
            color: white;
            background: rgb(78, 33, 162);
            font-size: 18px;
            padding: 12px 25px;
            margin: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
            </style></head>
        <body>
            <h1>Food Survey</h1>
            <br>
            <h2>Do you like food?</h2>
            <button class="btn-box">Yes</button>
            <button class="btn-box">No</button>
            <br>
            <h2>Pineapple on pizza?</h2>
            <button class="btn-box">Ew no disgusting</button>
            <button class="btn-box">Absolutely</button>
            <h2>Whats ur favorite food?</h2>
            <textarea></textarea>
            <br>
            <button class="btn-box" type="submit">Submit</button>
        </body>
    </html>
