<!DOCTYPE html>
    <html>
        <head><title>Styling 1</title><style>
            body {
                background:turquoise;
                text-align: center;
        }
            p {
            color: blue;
            font-size: 25px;
            font-family: 'Comic Sans MS', cursive;
        }
            img {
                width: 250px;
                height: 250px;
            }
            button {
                color: rgb(255, 255, 255);
                background: rgb(111, 90, 198);
                font-size: 15px;
                border: 6px solid purple;
                cursor: pointer;
                margin: 10px;
                padding: 5px;
        }
        </style></head>
        <body>
            <!-- Text
                ↓
            padding adds space around text
                ↓
            border draws box
                ↓
            margin creates space outside box
            p        → tag selector
                ↓
            .text    → class selector
                ↓
            #title   → id selector
                ↓
            selector {
            property: value;
            }
                ↓
            .box {
            padding: 10px;
            border: 2px solid black;
            margin: 20px;
                ↓
            The class selector selects HTML elements with a specific class attribute.
            To select elements with a specific class, write a period (.) character, followed by the class name.
                ↓
                The id selector uses the id attribute of an HTML element to select a specific element.
            The id of an element is unique within a page, so the id selector is used to select one unique element!
            To select an element with a specific id, write a hash (#) character, followed by the id of the element.
                ↓
            CSS selectors are used to "find" (or select) the HTML elements you want to style.
            }
             -->
            <h1>Styling</h1>
            <p>Hello, this is my first styling page.</p>
            <p>Something in the paragraph.</p>
            <img src="https://i.kym-cdn.com/entries/icons/facebook/000/045/198/smilingbucktooth.jpg">
            <br>
            <button type="submit">Okay</button>
        </body>
    </html>
</DOCTYPE>
