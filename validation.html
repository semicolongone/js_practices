<!DOCTYPE html>
    <html>
        <head>
        <title>Validation Form</title>
        </head>
        <body>
            <h1>Student Registration Form</h1>
            <form action="submit.html" method="post">
                <label for="name">Name:</label>
                <br>
                <input type="text" name="name" required minlength="3" placeholder="Enter name" id="name">
                <br>
                <br>
            <label for="email">Email:</label>
                <br>
                <input type="email" name="email" placeholder="Enter email" id="email" required>
                <br>
                <br>
            <label for="age">Age:</label>
                <br>
                <input type="number" name="age" placeholder="Enter age" id="age" min="5" max="18" required>
                <br>
                <br>
            <label for="number">Contact Number:</label>
                <br>
                <input type="text" name="phone" pattern="[0-9]{10}" title="Enter 10 digit number" placeholder="Enter contact number" required>
            <br>
            <br>
            <label for="password">Password:</label>
                <br>
                <input type="text" name="password" placeholder="Enter password" id="password" minlength="8" maxlength="20" required>
                <br>
                <br>
            <label for="grade">Grades</label>
            <br>
            <select name="grade">
                <option disabled selected hidden>Choose your grade level</option>
                <option value="">Grade 7</option>
                <option value="">Grade 8</option>
                <option value="">Grade 9</option>
            <select>
                <br>
                <br>
            <input type="checkbox" id="checkbox" required checked>
            <label for="checkbox">I accept all terms and conditions</label>
            <br>
            <br>
            <button type="submit">Register</button>
            </form>
        </body>
    </html>
</DOCTYPE>
