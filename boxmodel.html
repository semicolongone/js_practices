<!DOCTYPE html>
<html>
    <head><title>Box Model</title>
        <style>
            body {
                background-color: lightsteelblue;
            }
            .box {
                width: 300px;
                border: 5px solid navy;
                padding: 25px;
                margin: 20px auto;
                display: block;
                text-align: justify;
                color: blue;
                background-color: lightskyblue;
            }
            .box p {
                vertical-align: sub;
            }
            img {
                vertical-align: super;
            }
            h1 {
                text-decoration: overline underline line-through rgb(121, 177, 255) wavy;
                text-transform: uppercase;
                text-indent: 20px;
                letter-spacing: 20px;
                line-height: 1.8;
                word-spacing: 20px;
                text-shadow: 74px -13px 0px black, -48px 87px 0px green, -81px -43px 0px red;
                font-family: cursive;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>A heading, what do you expect.</h1>
            <p>This is a paragraph.<img src="https://media1.tenor.com/m/GPmklRgPMOsAAAAC/biao-panda.gif" height="150px" width="150px"></p>
        </div>
    </body>
</html>
