<!DOCTYPE html>
<html>
    <head><title>Semantics</title>
    <style>
        body {
            background: rgb(196 254 246);
            height: 100%;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            font-family: cursive;
            text-align: center;
        }
        h1 {
            text-align: center;
            margin-bottom: 0px;
            font-size: 37px;
        }
        nav {
                padding: 5px;
            margin-top: 0px;
        }
        p {
            font-size: 14px;
        }
        main {
            flex: 1;
        }
        /* flex:1 = 1 piece of space
        flex:2 = 2 pieces of space
        flex:3 = 3 pieces of space 
        Flexbox, flex controls how much space an element takes inside a flex container
        example:
            main {
            flex: 2;
            }
        The element takes twice the space compared to an element with flex:1
        total vh= 900 vh
        flex:1 + flex:2
        Box1 = 300px
        Box2 = 600px*/
    </style></head>

        <!-- <div>
